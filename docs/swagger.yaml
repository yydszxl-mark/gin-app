basePath: /
definitions:
  gin-app-start_internal_dto.ChangePasswordRequest:
    properties:
      new_password:
        maxLength: 32
        minLength: 6
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  gin-app-start_internal_dto.CreateDeviceRequest:
    properties:
      content:
        example: '{}'
        type: string
      name:
        example: iPhone 13
        type: string
      type:
        example: phone
        type: string
    required:
    - name
    - type
    type: object
  gin-app-start_internal_dto.CreateUserRequest:
    properties:
      email:
        example: john@example.com
        type: string
      password:
        example: password123
        maxLength: 32
        minLength: 6
        type: string
      phone:
        example: "13800138000"
        type: string
      username:
        example: john_doe
        maxLength: 32
        minLength: 3
        type: string
    required:
    - password
    - username
    type: object
  gin-app-start_internal_dto.LoginRequest:
    properties:
      password:
        example: password123
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  gin-app-start_internal_dto.LoginResponse:
    properties:
      expires_at:
        type: integer
      token:
        type: string
      user_info:
        $ref: '#/definitions/gin-app-start_internal_dto.UserInfo'
    type: object
  gin-app-start_internal_dto.RefreshTokenRequest:
    properties:
      token:
        type: string
    required:
    - token
    type: object
  gin-app-start_internal_dto.UpdateDeviceRequest:
    properties:
      content:
        example: '{}'
        type: string
      name:
        example: iPhone 13
        type: string
    required:
    - name
    type: object
  gin-app-start_internal_dto.UpdateUserRequest:
    properties:
      avatar:
        example: https://example.com/avatar.jpg
        type: string
      email:
        example: john@example.com
        type: string
      phone:
        example: "13800138000"
        type: string
      status:
        enum:
        - 0
        - 1
        example: 1
        type: integer
    type: object
  gin-app-start_internal_dto.UserInfo:
    properties:
      avatar:
        type: string
      email:
        type: string
      id:
        type: integer
      phone:
        type: string
      roles:
        items:
          type: string
        type: array
      status:
        type: integer
      username:
        type: string
    type: object
  gin-app-start_pkg_response.Response:
    properties:
      code:
        example: 0
        type: integer
      data: {}
      message:
        example: success
        type: string
      trace_id:
        example: trace-id-123
        type: string
    type: object
host: localhost:9060
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a RESTful API server built with Gin framework.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Gin App API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with username and password
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gin-app-start_internal_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gin-app-start_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/gin-app-start_internal_dto.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      summary: User login
      tags:
      - auth
  /api/v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Get new access token using refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gin-app-start_internal_dto.RefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gin-app-start_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/gin-app-start_internal_dto.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      summary: Refresh access token
      tags:
      - auth
  /api/v1/devices:
    get:
      consumes:
      - application/json
      description: Get paginated list of devices
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      summary: List devices
      tags:
      - devices
    post:
      consumes:
      - application/json
      description: Create a new device with name, type and content
      parameters:
      - description: Device information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gin-app-start_internal_dto.CreateDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      summary: Create a new device
      tags:
      - devices
  /api/v1/devices/{id}:
    delete:
      consumes:
      - application/json
      description: Delete device by device ID
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      summary: Delete device
      tags:
      - devices
    get:
      consumes:
      - application/json
      description: Get device information by device ID
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      summary: Get device by ID
      tags:
      - devices
    put:
      consumes:
      - application/json
      description: Update device information by device ID
      parameters:
      - description: Device ID
        in: path
        name: id
        required: true
        type: integer
      - description: Device information to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gin-app-start_internal_dto.UpdateDeviceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      summary: Update device information
      tags:
      - devices
  /api/v1/user/change-password:
    post:
      consumes:
      - application/json
      description: Change current user password
      parameters:
      - description: Password change request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gin-app-start_internal_dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /api/v1/user/info:
    get:
      consumes:
      - application/json
      description: Get authenticated user information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gin-app-start_pkg_response.Response'
            - properties:
                data:
                  $ref: '#/definitions/gin-app-start_internal_dto.UserInfo'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - auth
  /api/v1/user/logout:
    post:
      consumes:
      - application/json
      description: Logout current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - auth
  /api/v1/users:
    get:
      consumes:
      - application/json
      description: Get paginated list of users
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Create a new user with username, email, phone and password
      parameters:
      - description: User information
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gin-app-start_internal_dto.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Create a new user
      tags:
      - users
  /api/v1/users/{id}:
    delete:
      consumes:
      - application/json
      description: Delete user by user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Delete user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get user information by user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Get user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user information by user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: User information to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/gin-app-start_internal_dto.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/gin-app-start_pkg_response.Response'
      security:
      - BearerAuth: []
      summary: Update user information
      tags:
      - users
  /health:
    get:
      consumes:
      - application/json
      description: Check if the service is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/gin-app-start_pkg_response.Response'
            - properties:
                data:
                  properties:
                    message:
                      type: string
                    status:
                      type: string
                  type: object
              type: object
      summary: Health check
      tags:
      - health
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
